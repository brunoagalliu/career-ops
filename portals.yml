# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Paid Media / Paid Ads --
    - "Paid Media"
    - "Paid Ads"
    - "Paid Search"
    - "Paid Social"
    - "PPC"
    - "SEM"
    - "Google Ads"
    - "Meta Ads"
    - "Facebook Ads"
    - "Biddable Media"
    - "Performance Marketing"
    - "Performance Media"
    - "Ad Operations"
    - "Ad Ops"
    - "AdOps"
    - "Ad Trafficking"
    - "Programmatic"
    - "Display Advertising"
    - "Search Advertising"
    - "Digital Advertising"
    - "Media Buyer"
    - "Media Buying"
    # -- Marketing roles --
    - "Digital Marketing"
    - "Growth Marketing"
    - "Demand Generation"
    - "Marketing Manager"
  negative:
    - "Intern"
    - "SEO only"
    - "Content Writer"
    - "Copywriter"
    - "Graphic Designer"
    - "Software Engineer"
    - "Developer"
    - "Data Engineer"
    - "Data Scientist"
    - "Accountant"
    - "Sales Representative"
    - "Customer Support"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Head"
    - "Manager"
    - "Director"
    - "Specialist"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.

search_queries:
  # -- Ashby --
  - name: Ashby — Paid Media
    query: 'site:jobs.ashbyhq.com "Paid Media" OR "Paid Ads" OR "PPC" OR "SEM" remote'
    enabled: true

  - name: Ashby — Ad Operations
    query: 'site:jobs.ashbyhq.com "Ad Operations" OR "Ad Ops" OR "Ad Trafficking" remote'
    enabled: true

  - name: Ashby — Performance Marketing
    query: 'site:jobs.ashbyhq.com "Performance Marketing" OR "Growth Marketing" OR "Demand Generation" remote'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — Paid Media
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Paid Media" OR "Paid Ads" OR "PPC" remote'
    enabled: true

  - name: Greenhouse — Ad Ops
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Ad Operations" OR "Ad Ops" OR "Programmatic" remote'
    enabled: true

  - name: Greenhouse — Performance Marketing
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Performance Marketing" OR "Demand Generation" remote'
    enabled: true

  # -- Lever --
  - name: Lever — Paid Media & Ad Ops
    query: 'site:jobs.lever.co "Paid Media" OR "Paid Ads" OR "Ad Operations" OR "Performance Marketing" remote'
    enabled: true

  # -- LinkedIn --
  - name: LinkedIn — Paid Media Remote
    query: 'site:linkedin.com/jobs "paid media manager" OR "paid ads specialist" OR "performance marketing manager" remote'
    enabled: true

  - name: LinkedIn — Ad Operations Remote
    query: 'site:linkedin.com/jobs "ad operations manager" OR "ad ops" OR "programmatic manager" remote'
    enabled: true

  # -- We Work Remotely --
  - name: WWR — Marketing
    query: 'site:weworkremotely.com "paid media" OR "paid ads" OR "PPC" OR "performance marketing" OR "ad operations"'
    enabled: true

  # -- Remote OK --
  - name: RemoteOK — Marketing
    query: 'site:remoteok.com "paid media" OR "paid ads" OR "ad operations" OR "performance marketing"'
    enabled: true

  # -- Himalayas (remote-first aggregator) --
  - name: Himalayas — Paid Media Remote
    query: 'site:himalayas.app "paid media" OR "performance marketing" OR "paid search" OR "paid social" remote'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — Performance Marketing
    query: 'site:wellfound.com "paid media" OR "performance marketing" OR "growth marketing" remote'
    enabled: true

